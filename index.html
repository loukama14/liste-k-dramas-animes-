<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACKER K-DRAMAS & ANIMES COLOR</title>
    <style>
        :root {
            --happy: #f1c40f;    /* Jaune */
            --sad: #3498db;      /* Bleu */
            --stressed: #e74c3c; /* Rouge */
            --romantic: #e84393; /* Rose */
            --brain: #00b894;    /* Vert */
            --bg: #0f0c29;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 20px; color: #fff; 
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: auto; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 30px; }

        /* Stats & Recherche */
        .stats { 
            text-align: center; margin-bottom: 25px; background: rgba(255,255,255,0.05); 
            padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        #count { font-size: 1.5rem; font-weight: bold; color: var(--happy); }

        .search-container { max-width: 500px; margin: 0 auto 30px; }
        #searchInput { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.3); color: #fff; outline: none;
        }

        /* Onglets */
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; position: sticky; top: 0; background: var(--bg); padding: 15px 0; z-index: 100; }
        .tab-btn { 
            padding: 10px 18px; border: 2px solid transparent; border-radius: 8px; 
            cursor: pointer; font-weight: bold; background: #1a1a2e; color: #fff; transition: 0.3s;
        }

        /* Couleurs des boutons par ID */
        #btn-happy { border-color: var(--happy); color: var(--happy); }
        #btn-sad { border-color: var(--sad); color: var(--sad); }
        #btn-stressed { border-color: var(--stressed); color: var(--stressed); }
        #btn-romantic { border-color: var(--romantic); color: var(--romantic); }
        #btn-brain { border-color: var(--brain); color: var(--brain); }

        .tab-btn.active { color: #000 !important; }
        #btn-happy.active { background: var(--happy); }
        #btn-sad.active { background: var(--sad); }
        #btn-stressed.active { background: var(--stressed); }
        #btn-romantic.active { background: var(--romantic); }
        #btn-brain.active { background: var(--brain); }

        /* Sections */
        .mood-section { display: none; }
        .mood-section.active { display: block; }

        .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .columns { grid-template-columns: 1fr; } }

        /* Cartes Dynamiques */
        .card { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; 
            border-top: 5px solid transparent; transition: 0.3s;
        }
        
        /* Styles spécifiques par mood */
        #happy .card { border-top-color: var(--happy); }
        #sad .card { border-top-color: var(--sad); }
        #stressed .card { border-top-color: var(--stressed); }
        #romantic .card { border-top-color: var(--romantic); }
        #brain .card { border-top-color: var(--brain); }

        h2 { margin-top: 0; font-size: 1.1rem; text-align: center; margin-bottom: 20px; text-transform: uppercase; }

        /* Listes */
        .list-container { max-height: 600px; overflow-y: auto; padding-right: 10px; }
        
        /* Personnalisation des scrollbars par catégorie */
        #happy .list-container::-webkit-scrollbar-thumb { background: var(--happy); }
        #sad .list-container::-webkit-scrollbar-thumb { background: var(--sad); }
        #stressed .list-container::-webkit-scrollbar-thumb { background: var(--stressed); }
        #romantic .list-container::-webkit-scrollbar-thumb { background: var(--romantic); }
        #brain .list-container::-webkit-scrollbar-thumb { background: var(--brain); }

        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }

        ul { list-style: none; padding: 0; }
        li { 
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between;
        }

        .item-left { display: flex; align-items: center; gap: 15px; flex-grow: 1; overflow: hidden; }
        .check-circle { 
            width: 20px; height: 20px; border: 2px solid #555; border-radius: 50%; 
            cursor: pointer; flex-shrink: 0; transition: 0.2s;
        }

        .title-link { color: #eee; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.95rem; }
        
        /* États cochés */
        li.watched .title-link { color: #444; text-decoration: line-through; }
        li.watched .check-circle { background: #2ecc71; border-color: #2ecc71; }

        /* Score */
        select { background: #000; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 4px; font-size: 0.8rem; outline: none; }
        #happy select { color: var(--happy); }
        #sad select { color: var(--sad); }
        #stressed select { color: var(--stressed); }
        #romantic select { color: var(--romantic); }
        #brain select { color: var(--brain); }
    </style>
</head>

    function generateContent() {
        const container = document.getElementById('main-content');
        const scoreOptions = Array.from({length: 41}, (_, i) => (i / 2).toFixed(1));

        for (let key in database) {
            const mood = database[key];
            const section = document.createElement('div');
            section.id = key; section.className = 'mood-section';
            
            section.innerHTML = `
                <div class="columns">
                    <div class="card">
                        <h2>🇰🇷 K-DRAMAS</h2>
                        <div class="list-container"><ul id="list-kd-${key}"></ul></div>
                    </div>
                    <div class="card">
                        <h2>🇯🇵 ANIMES</h2>
                        <div class="list-container"><ul id="list-an-${key}"></ul></div>
                    </div>
                </div>
            `;
            container.appendChild(section);

            const fill = (ulId, list, type) => {
                const ul = document.getElementById(ulId);
                list.forEach(t => {
                    const li = document.createElement('li');
                    const url = type === 'kd' ? `https://mydramalist.com/search?q=${encodeURIComponent(t)}` : `https://myanimelist.net/anime.php?q=${encodeURIComponent(t)}`;
                    li.innerHTML = `
                        <div class="item-left">
                            <div class="check-circle" onclick="toggleItem(this.parentElement.parentElement)"></div>
                            <a href="${url}" target="_blank" class="title-link">${t}</a>
                        </div>
                        <select onchange="saveScore('${t}', this.value)">
                            <option value="">-</option>
                            ${scoreOptions.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>
                    `;
                    ul.appendChild(li);
                });
            };
            fill(`list-kd-${key}`, mood.kd, 'kd');
            fill(`list-an-${key}`, mood.an, 'an');
        }
    }

    function showMood(id) {
        document.querySelectorAll('.mood-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function toggleItem(li) {
        li.classList.toggle('watched');
        updateCounter();
        saveProgress();
    }

    function updateCounter() {
        document.getElementById('count').innerText = document.querySelectorAll('li.watched').length;
    }

    function saveScore(title, score) {
        let sc = JSON.parse(localStorage.getItem('scores_v3') || "{}");
        sc[title] = score;
        localStorage.setItem('scores_v3', JSON.stringify(sc));
    }

    function saveProgress() {
        const idx = [];
        document.querySelectorAll('li').forEach((li, i) => { if(li.classList.contains('watched')) idx.push(i); });
        localStorage.setItem('progress_v3', JSON.stringify(idx));
    }

    function load() {
        const savedIdx = localStorage.getItem('progress_v3');
        const all = document.querySelectorAll('li');
        if(savedIdx) JSON.parse(savedIdx).forEach(i => { if(all[i]) all[i].classList.add('watched'); });
        
        let sc = JSON.parse(localStorage.getItem('scores_v3') || "{}");
        all.forEach(li => {
            const t = li.querySelector('.title-link').innerText.trim();
            if(sc[t]) li.querySelector('select').value = sc[t];
        });
        updateCounter();
    }

    function searchFunction() {
        const q = document.getElementById('searchInput').value.toUpperCase();
        const items = document.querySelectorAll('li');
        const sections = document.querySelectorAll('.mood-section');
        if(q !== "") {
            sections.forEach(s => s.style.display = "block");
            items.forEach(li => {
                const title = li.querySelector('.title-link').innerText.toUpperCase();
                li.style.display = title.includes(q) ? "flex" : "none";
            });
        } else {
            sections.forEach(s => s.style.display = "none");
            document.querySelector('.mood-section.active').style.display = "block";
            items.forEach(li => li.style.display = "flex");
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        generateContent();
        showMood('happy');
        load();
    });
</script>

</body>
</html>
